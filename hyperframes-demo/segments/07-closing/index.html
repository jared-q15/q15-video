<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #000; }
body { font-family: "Helvetica Neue", Arial, sans-serif; }

.bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #0a0a1e 0%, #1a0a2e 40%, #0a1a3e 100%);
}

.glow {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
  opacity: 0;
}

.title {
  position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
  font-size: 72px; font-weight: 900; color: #e8eef5; text-align: center;
  letter-spacing: -2px; line-height: 1.1;
}

.title .gradient-text {
  background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.accent-bar {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 0; height: 4px;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
  border-radius: 2px;
}

.features {
  position: absolute; top: 58%; left: 50%; transform: translateX(-50%);
  display: flex; gap: 40px; opacity: 0;
}

.feature {
  font-size: 20px; color: #7a8ba0; font-weight: 400;
  display: flex; align-items: center; gap: 8px;
}

.feature::before {
  content: "▸"; color: #3b82f6; font-size: 18px;
}

.repo {
  position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
  font-family: "Courier New", monospace; font-size: 24px;
  color: #4a9eff; opacity: 0;
}

.made-with {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  font-size: 16px; color: #4a5568; opacity: 0;
}
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0" data-duration="6" data-width="1920" data-height="1080">

  <div class="bg clip" data-start="0" data-duration="6" data-track-index="0"></div>
  <div class="glow clip" data-start="0" data-duration="6" data-track-index="1"></div>

  <div class="title clip" data-start="0.5" data-duration="5.5" data-track-index="2">
    <span class="gradient-text" id="brand">HyperFrames</span><br>
    <span style="font-size: 36px; font-weight: 400; color: #7a8ba0;" id="tagline">Demo Reel</span>
  </div>

  <div class="accent-bar clip" data-start="1.5" data-duration="4.5" data-track-index="3"></div>

  <div class="features clip" data-start="2.5" data-duration="3.5" data-track-index="4">
    <div class="feature">HTML Native</div>
    <div class="feature">GSAP Motion</div>
    <div class="feature">Agent Friendly</div>
    <div class="feature">Open Source</div>
  </div>

  <div class="repo clip" data-start="3" data-duration="3" data-track-index="5">github.com/q15co/q15-video</div>
  <div class="made-with clip" data-start="3.5" data-duration="2.5" data-track-index="5">Rendered with headless Chromium + FFmpeg · 1920×1080 · 30fps</div>

</div>
<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({ paused: true });
tl.to(".glow", { opacity: 1, duration: 1, ease: "power2.out" }, 0)
  .from("#brand", { opacity: 0, y: 40, duration: 0.8, ease: "power3.out" }, 0.5)
  .from("#tagline", { opacity: 0, y: 20, duration: 0.6, ease: "power2.out" }, 1.0)
  .to(".accent-bar", { width: 500, duration: 0.6, ease: "power3.out" }, 1.5)
  .to(".features", { opacity: 1, duration: 0.8, ease: "power2.out" }, 2.5)
  .to(".repo", { opacity: 1, duration: 0.6, ease: "power2.out" }, 3)
  .to(".made-with", { opacity: 0.6, duration: 0.5 }, 3.5)
  .to(".glow", { scale: 1.3, opacity: 0.5, duration: 4, ease: "sine.inOut" }, 1)
  .to(".glow", { opacity: 0, duration: 0.5 }, 5.3)
  .to(".title, .accent-bar, .features, .repo, .made-with", { opacity: 0, duration: 0.5 }, 5.3);
window.__timelines["main"] = tl;
</script>
</body>
</html>
