<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #0a0e1a; }
body { font-family: "Helvetica Neue", Arial, sans-serif; }

.bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(160deg, #0f172a 0%, #1e1b4b 100%);
}

.label {
  position: absolute; top: 80px; left: 80px;
  font-size: 18px; font-weight: 600; color: #4a9eff;
  letter-spacing: 4px; text-transform: uppercase; opacity: 0.6;
}

.chart-title {
  position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
  font-size: 42px; font-weight: 700; color: #e8eef5; text-align: center;
  opacity: 0;
}

.chart-subtitle {
  position: absolute; top: 185px; left: 50%; transform: translateX(-50%);
  font-size: 22px; font-weight: 400; color: #7a8ba0; opacity: 0;
}

.chart-container {
  position: absolute; top: 280px; left: 50%; transform: translateX(-50%);
  width: 1200px; height: 600px;
  display: flex; align-items: flex-end; justify-content: space-around;
  padding: 0 40px 60px 40px;
}

.bar-group {
  display: flex; flex-direction: column; align-items: center; width: 180px;
}

.bar {
  width: 120px; border-radius: 8px 8px 0 0;
  height: 0; transform-origin: bottom;
}

.bar-val {
  font-size: 28px; font-weight: 700; color: #e8eef5;
  margin-bottom: 12px; opacity: 0;
}

.bar-label {
  font-size: 20px; font-weight: 500; color: #94a3b8;
  margin-top: 16px; text-align: center;
}

.b1 { background: linear-gradient(180deg, #3b82f6, #1e40af); }
.b2 { background: linear-gradient(180deg, #8b5cf6, #6d28d9); }
.b3 { background: linear-gradient(180deg, #ec4899, #be185d); }
.b4 { background: linear-gradient(180deg, #f59e0b, #d97706); }
.b5 { background: linear-gradient(180deg, #10b981, #047857); }

.total {
  position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
  font-size: 24px; font-weight: 400; color: #4a9eff; font-family: "Courier New", monospace;
  opacity: 0;
}
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0" data-duration="6" data-width="1920" data-height="1080">

  <div class="bg clip" data-start="0" data-duration="6" data-track-index="0"></div>
  <div class="label clip" data-start="0" data-duration="6" data-track-index="1">04 — Data Visualization</div>

  <div class="chart-title clip" data-start="0.3" data-duration="5.5" data-track-index="2" id="title">Animation Techniques by Impact</div>
  <div class="chart-subtitle clip" data-start="0.6" data-duration="5" data-track-index="2" id="subtitle">Render time per segment (seconds, lower is better)</div>

  <div class="chart-container clip" data-start="0.5" data-duration="5.5" data-track-index="3">
    <div class="bar-group">
      <div class="bar-val" id="v1">3.2s</div>
      <div class="bar b1" id="bar1"></div>
      <div class="bar-label">Title</div>
    </div>
    <div class="bar-group">
      <div class="bar-val" id="v2">4.1s</div>
      <div class="bar b2" id="bar2"></div>
      <div class="bar-label">Morph</div>
    </div>
    <div class="bar-group">
      <div class="bar-val" id="v3">5.8s</div>
      <div class="bar b3" id="bar3"></div>
      <div class="bar-label">Code</div>
    </div>
    <div class="bar-group">
      <div class="bar-val" id="v4">2.9s</div>
      <div class="bar b4" id="bar4"></div>
      <div class="bar-label">Chart</div>
    </div>
    <div class="bar-group">
      <div class="bar-val" id="v5">3.7s</div>
      <div class="bar b5" id="bar5"></div>
      <div class="bar-label">3D</div>
    </div>
  </div>

  <div class="total clip" data-start="4" data-duration="1.8" data-track-index="4" id="total">Total: 19.7s render → 34s video</div>

</div>
<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({ paused: true });
tl.to("#title", { opacity: 1, duration: 0.5, ease: "power2.out" }, 0.3)
  .to("#subtitle", { opacity: 1, duration: 0.5, ease: "power2.out" }, 0.6)
  .to("#bar1", { height: 320, duration: 0.8, ease: "power3.out" }, 1.0)
  .to("#v1", { opacity: 1, duration: 0.3 }, 1.5)
  .to("#bar2", { height: 410, duration: 0.8, ease: "power3.out" }, 1.2)
  .to("#v2", { opacity: 1, duration: 0.3 }, 1.7)
  .to("#bar3", { height: 580, duration: 0.8, ease: "power3.out" }, 1.4)
  .to("#v3", { opacity: 1, duration: 0.3 }, 1.9)
  .to("#bar4", { height: 290, duration: 0.8, ease: "power3.out" }, 1.6)
  .to("#v4", { opacity: 1, duration: 0.3 }, 2.1)
  .to("#bar5", { height: 370, duration: 0.8, ease: "power3.out" }, 1.8)
  .to("#v5", { opacity: 1, duration: 0.3 }, 2.3)
  .to("#total", { opacity: 1, duration: 0.5, ease: "power2.out" }, 4.0)
  .to(".chart-title, .chart-subtitle, .chart-container, .total, .label", { opacity: 0, duration: 0.4 }, 5.5);
window.__timelines["main"] = tl;
</script>
</body>
</html>
